name: Release desktop

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        options: [stable, canary]
        default: stable
      tag:
        description: "stable: tag to publish, e.g. desktop-v1.1.0"
        required: false
        type: string
      base_version:
        description: "canary: next stable version, e.g. 1.5.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, platform: darwin/universal, name: darwin-universal }
          - { runner: windows-latest, platform: windows/amd64, name: windows-amd64 }
          - { runner: windows-11-arm, platform: windows/arm64, name: windows-arm64 }
          - { runner: ubuntu-22.04, platform: linux/amd64, name: linux-amd64 }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install nfpm
        if: runner.os == 'Linux'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" >> "$GITHUB_PATH"

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -z "$APPLE_CERT_P12" ]; then
            echo "APPLE_CERT_P12 unset; desktop build will ad-hoc sign and remain un-notarized"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Resolve version
        id: ver
        run: bash scripts/resolve-desktop-release.sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_CHANNEL: ${{ inputs.channel }}
          IN_TAG: ${{ inputs.tag }}
          IN_BASE_VERSION: ${{ inputs.base_version }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}

      - name: Build and package
        env:
          HAS_APPLE_CERT: ${{ secrets.APPLE_CERT_P12 != '' && secrets.APPLE_CERT_PASSWORD != '' && secrets.APPLE_API_KEY_P8 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/notary.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: scripts/desktop-build.sh "${{ matrix.platform }}" "${{ steps.ver.outputs.version }}" "${{ steps.ver.outputs.channel }}"

      - name: Check minisign secrets
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          if [ -z "$MINISIGN_PRIVATE_KEY" ] || [ -z "$MINISIGN_PASSWORD" ]; then
            echo "::error::MINISIGN_PRIVATE_KEY and MINISIGN_PASSWORD secrets are required for updater-safe releases"
            exit 1
          fi

      - name: Sign artifacts
        working-directory: desktop
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: go run ./cmd/sign sign ../dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: desktop/go.mod
          cache: true
          cache-dependency-path: desktop/go.sum

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Resolve version
        id: ver
        run: bash scripts/resolve-desktop-release.sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_CHANNEL: ${{ inputs.channel }}
          IN_TAG: ${{ inputs.tag }}
          IN_BASE_VERSION: ${{ inputs.base_version }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}

      - name: Generate manifest
        working-directory: desktop
        run: go run ./cmd/sign manifest ../dist "${{ steps.ver.outputs.version }}" "${{ steps.ver.outputs.tag }}"

      - name: Publish canary pointer release
        if: steps.ver.outputs.channel == 'canary'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "Artistic Genius Desktop canary" \
              --notes "Rolling canary desktop build." \
              --prerelease \
              --latest=false
          fi

      - name: Publish stable version release
        if: steps.ver.outputs.channel != 'canary'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            args=(--title "Artistic Genius Desktop ${{ steps.ver.outputs.version }}" --generate-notes --latest=false)
            [ "${{ steps.ver.outputs.prerelease }}" = "true" ] && args+=(--prerelease)
            gh release create "$tag" dist/* "${args[@]}"
          fi

      - name: Update stable manifest pointer
        if: steps.ver.outputs.channel != 'canary' && steps.ver.outputs.prerelease != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pointer="desktop-latest"
          if gh release view "$pointer" >/dev/null 2>&1; then
            gh release upload "$pointer" dist/latest.json --clobber
          else
            gh release create "$pointer" dist/latest.json \
              --title "Artistic Genius Desktop latest" \
              --notes "Stable updater manifest pointer. Assets live on versioned desktop-v* releases." \
              --prerelease \
              --latest=false
          fi
